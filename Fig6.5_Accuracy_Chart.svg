<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="800" height="600">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Accuracy Comparison of Waste Classification Algorithms</text>
  <text x="300" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">(AI-Powered Waste Management System)</text>
  
  <!-- Y Axis Label -->
  <text x="-190" y="25" font-family="Arial, sans-serif" font-size="14" transform="rotate(-90)" font-weight="bold" text-anchor="middle">Accuracy (%)</text>
  
  <!-- X Axis Label -->
  <text x="300" y="380" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Models</text>
  
  <!-- Chart Area -->
  <g transform="translate(60, 90)">
    <!-- Grid Lines & Y Axis Ticks -->
    <line x1="0" y1="0" x2="480" y2="0" stroke="#ccc" stroke-dasharray="4"/>
    <text x="-10" y="5" font-family="Arial" font-size="12" text-anchor="end">100</text>
    
    <line x1="0" y1="50" x2="480" y2="50" stroke="#ccc" stroke-dasharray="4"/>
    <text x="-10" y="55" font-family="Arial" font-size="12" text-anchor="end">80</text>
    
    <line x1="0" y1="100" x2="480" y2="100" stroke="#ccc" stroke-dasharray="4"/>
    <text x="-10" y="105" font-family="Arial" font-size="12" text-anchor="end">60</text>
    
    <line x1="0" y1="150" x2="480" y2="150" stroke="#ccc" stroke-dasharray="4"/>
    <text x="-10" y="155" font-family="Arial" font-size="12" text-anchor="end">40</text>
    
    <line x1="0" y1="200" x2="480" y2="200" stroke="#ccc" stroke-dasharray="4"/>
    <text x="-10" y="205" font-family="Arial" font-size="12" text-anchor="end">20</text>
    
    <line x1="0" y1="250" x2="480" y2="250" stroke="#333" stroke-width="1.5"/>
    <text x="-10" y="255" font-family="Arial" font-size="12" text-anchor="end">0</text>
    
    <line x1="0" y1="0" x2="0" y2="250" stroke="#333" stroke-width="1.5"/>
    
    <!-- Bars -->
    <rect x="40" y="20" width="100" height="230" fill="#87CEEB"/>
    <text x="90" y="35" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">92.00%</text>
    <text x="90" y="270" font-family="Arial" font-size="13" text-anchor="middle">Simple CNN</text>
    
    <rect x="190" y="37.5" width="100" height="212.5" fill="#FA8072"/>
    <text x="240" y="52.5" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">85.00%</text>
    <text x="240" y="270" font-family="Arial" font-size="13" text-anchor="middle">CNN-LSTM</text>
    
    <rect x="340" y="10" width="100" height="240" fill="#90EE90"/>
    <text x="390" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">96.00%</text>
    <text x="390" y="270" font-family="Arial" font-size="13" text-anchor="middle">YOLOv8</text>
  </g>
</svg>
