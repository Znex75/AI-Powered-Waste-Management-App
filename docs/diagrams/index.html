<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EcoCycle System Diagrams</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #12372a;
      background: #f4faf6;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 36px; }
    header { max-width: 1100px; margin: 0 auto 30px; }
    h1 { margin: 0 0 8px; font-size: 34px; }
    p { margin: 0; color: #486457; }
    main { display: grid; gap: 30px; max-width: 1500px; margin: 0 auto; }
    figure {
      margin: 0;
      padding: 18px;
      background: white;
      border: 1px solid #d6e8df;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(18, 55, 42, .06);
    }
    figcaption { font-size: 20px; font-weight: 700; margin: 0 0 14px; }
    img { display: block; width: 100%; height: auto; border-radius: 8px; }
    @media print {
      body { padding: 0; background: white; }
      header { margin: 0 0 14px; }
      figure { border: 0; box-shadow: none; page-break-after: always; padding: 0; }
    }
  </style>
</head>
<body>
  <header>
    <h1>EcoCycle System Diagrams</h1>
    <p>AI-powered waste management application: entity relationships, use cases and data flows.</p>
  </header>
  <main>
    <figure>
      <figcaption>1. Entity Relationship Diagram</figcaption>
      <img src="er-diagram.svg" alt="EcoCycle entity relationship diagram">
    </figure>
    <figure>
      <figcaption>2. Use Case Diagram</figcaption>
      <img src="use-case-diagram.svg" alt="EcoCycle use case diagram">
    </figure>
    <figure>
      <figcaption>3. Data Flow Diagram - Context / Level 0</figcaption>
      <img src="dfd-context-diagram.svg" alt="EcoCycle DFD context diagram">
    </figure>
    <figure>
      <figcaption>4. Data Flow Diagram - Level 1</figcaption>
      <img src="dfd-level-1-diagram.svg" alt="EcoCycle DFD Level 1 diagram">
    </figure>
  </main>
</body>
</html>
