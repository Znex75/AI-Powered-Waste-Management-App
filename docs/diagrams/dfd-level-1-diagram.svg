<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1180" viewBox="0 0 1700 1180">
  <defs>
    <style>
      .bg { fill: #fbfdfb; }
      .title { font: 700 30px Arial, sans-serif; fill: #12372a; }
      .subtitle { font: 15px Arial, sans-serif; fill: #486457; }
      .entity { fill: #ffffff; stroke: #1b4332; stroke-width: 2; rx: 8; }
      .entityAI { fill: #eef8f3; stroke: #2d6a4f; stroke-width: 2; rx: 8; }
      .et { font: 700 19px Arial, sans-serif; fill: #16372b; }
      .small { font: 14px Arial, sans-serif; fill: #39584a; }
      .process { fill: #e9f7ee; stroke: #166534; stroke-width: 2.5; }
      .adminProcess { fill: #e6f4f1; stroke: #0f766e; stroke-width: 2.5; }
      .pnum { font: 700 16px Arial, sans-serif; fill: #166534; }
      .pt { font: 700 17px Arial, sans-serif; fill: #17382d; }
      .store { fill: #ffffff; stroke: #24543f; stroke-width: 2; }
      .storeHead { fill: #dff0e7; }
      .dst { font: 700 16px Arial, sans-serif; fill: #16432e; }
      .flow { fill: none; stroke: #304f42; stroke-width: 1.9; marker-end: url(#arrow); }
      .secondary { fill: none; stroke: #587366; stroke-width: 1.6; marker-end: url(#arrow); }
      .labelBg { fill: #fbfdfb; }
      .label { font: 13px Arial, sans-serif; fill: #274638; }
      .note { fill: #edf7f1; stroke: #bfdece; stroke-width: 1; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #315447; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#304f42"/>
    </marker>
  </defs>
  <rect class="bg" width="1700" height="1180"/>
  <text class="title" x="48" y="52">EcoCycle Waste Management System - DFD Level 1</text>
  <text class="subtitle" x="48" y="78">Decomposition of authentication, scanning, impact tracking, marketplace transactions and administration</text>

  <!-- External entities -->
  <rect class="entity" x="40" y="225" width="205" height="102"/>
  <text class="et" x="142" y="267" text-anchor="middle">User</text>
  <text class="small" x="142" y="294" text-anchor="middle">app participant</text>

  <rect class="entity" x="1455" y="230" width="205" height="102"/>
  <text class="et" x="1557" y="272" text-anchor="middle">Administrator</text>
  <text class="small" x="1557" y="299" text-anchor="middle">system oversight</text>

  <rect class="entityAI" x="1455" y="507" width="205" height="108"/>
  <text class="et" x="1557" y="548" text-anchor="middle">AI Classification</text>
  <text class="et" x="1557" y="574" text-anchor="middle">Service</text>

  <!-- Processes -->
  <ellipse class="process" cx="450" cy="244" rx="154" ry="72"/>
  <text class="pnum" x="450" y="226" text-anchor="middle">1.0</text>
  <text class="pt" x="450" y="253" text-anchor="middle">Manage Account</text>
  <text class="pt" x="450" y="277" text-anchor="middle">&amp; Wallet</text>

  <ellipse class="process" cx="790" cy="515" rx="164" ry="82"/>
  <text class="pnum" x="790" y="491" text-anchor="middle">2.0</text>
  <text class="pt" x="790" y="519" text-anchor="middle">Identify and Classify</text>
  <text class="pt" x="790" y="543" text-anchor="middle">Waste Image</text>

  <ellipse class="process" cx="790" cy="762" rx="154" ry="72"/>
  <text class="pnum" x="790" y="744" text-anchor="middle">3.0</text>
  <text class="pt" x="790" y="771" text-anchor="middle">Record Scan &amp;</text>
  <text class="pt" x="790" y="795" text-anchor="middle">Track Impact</text>

  <ellipse class="process" cx="450" cy="888" rx="158" ry="76"/>
  <text class="pnum" x="450" y="868" text-anchor="middle">4.0</text>
  <text class="pt" x="450" y="895" text-anchor="middle">Manage Marketplace</text>
  <text class="pt" x="450" y="919" text-anchor="middle">&amp; Purchases</text>

  <ellipse class="adminProcess" cx="1184" cy="282" rx="167" ry="78"/>
  <text class="pnum" x="1184" y="261" text-anchor="middle" style="fill:#0f766e">5.0</text>
  <text class="pt" x="1184" y="289" text-anchor="middle">Monitor Platform</text>
  <text class="pt" x="1184" y="313" text-anchor="middle">&amp; Manage Credits</text>

  <!-- Data stores -->
  <path class="store" d="M315 445 H584 V541 H315 V445 M333 445 V541"/>
  <rect class="storeHead" x="334" y="446" width="249" height="30"/>
  <text class="dst" x="350" y="467">D1  User</text>
  <text class="small" x="350" y="503">profile, XP, CO2, EcoCoins, credits</text>

  <path class="store" d="M1047 718 H1324 V814 H1047 V718 M1065 718 V814"/>
  <rect class="storeHead" x="1066" y="719" width="257" height="30"/>
  <text class="dst" x="1082" y="740">D2  Scan</text>
  <text class="small" x="1082" y="777">type, bin, XP reward, CO2 saved</text>

  <path class="store" d="M248 1030 H574 V1124 H248 V1030 M266 1030 V1124"/>
  <rect class="storeHead" x="267" y="1031" width="306" height="30"/>
  <text class="dst" x="283" y="1052">D3  Listing</text>
  <text class="small" x="283" y="1087">item, price, seller, buyer, status</text>

  <path class="store" d="M684 1030 H1023 V1124 H684 V1030 M702 1030 V1124"/>
  <rect class="storeHead" x="703" y="1031" width="319" height="30"/>
  <text class="dst" x="719" y="1052">D4  Transaction</text>
  <text class="small" x="719" y="1087">top-up, credit purchase, sale / buy</text>

  <!-- Flows: User and account -->
  <path class="flow" d="M245 253 H294"/>
  <rect class="labelBg" x="250" y="220" width="145" height="24"/>
  <text class="label" x="256" y="237">sign in / profile request</text>
  <path class="secondary" d="M308 291 C280 303, 264 307, 245 307"/>
  <text class="label" x="251" y="340">profile and balance</text>

  <path class="flow" d="M450 316 V445"/>
  <rect class="labelBg" x="462" y="365" width="107" height="24"/>
  <text class="label" x="469" y="382">create / update</text>
  <path class="secondary" d="M390 445 V316"/>
  <text class="label" x="276" y="388">account data</text>

  <!-- User to scan -->
  <path class="flow" d="M245 286 C400 365, 528 460, 627 498"/>
  <rect class="labelBg" x="366" y="376" width="135" height="40"/>
  <text class="label" x="373" y="394">camera image or</text>
  <text class="label" x="373" y="410">uploaded photo</text>
  <path class="secondary" d="M650 558 C500 600, 355 527, 245 314"/>
  <rect class="labelBg" x="352" y="567" width="181" height="41"/>
  <text class="label" x="359" y="584">result, bin advice, XP</text>
  <text class="label" x="359" y="600">and price estimate</text>

  <!-- Scan and AI -->
  <path class="flow" d="M954 497 C1120 473, 1290 493, 1455 540"/>
  <text class="label" x="1110" y="478">image data</text>
  <path class="flow" d="M1455 586 C1284 628, 1119 614, 942 555"/>
  <rect class="labelBg" x="1100" y="621" width="220" height="41"/>
  <text class="label" x="1108" y="638">class, confidence and</text>
  <text class="label" x="1108" y="654">material category</text>

  <!-- Scan into impact record -->
  <path class="flow" d="M790 597 V690"/>
  <text class="label" x="804" y="648">confirmed result</text>
  <path class="flow" d="M944 762 H1047"/>
  <text class="label" x="960" y="745">save scan</text>
  <path class="flow" d="M703 705 C639 630, 583 553, 584 515"/>
  <rect class="labelBg" x="598" y="619" width="105" height="40"/>
  <text class="label" x="605" y="636">update XP,</text>
  <text class="label" x="605" y="652">CO2, credits</text>

  <!-- Marketplace -->
  <path class="flow" d="M245 298 C306 526, 348 704, 409 814"/>
  <rect class="labelBg" x="257" y="702" width="134" height="42"/>
  <text class="label" x="264" y="719">listing / buy</text>
  <text class="label" x="264" y="735">request</text>
  <path class="secondary" d="M335 858 C288 783, 258 674, 229 327"/>
  <text class="label" x="78" y="772">listings / receipt</text>
  <path class="flow" d="M421 964 V1030"/>
  <text class="label" x="434" y="1003">store / update sale</text>
  <path class="flow" d="M566 928 C637 965, 707 987, 766 1030"/>
  <text class="label" x="641" y="959">record EcoCoin transfer</text>
  <path class="flow" d="M485 815 C519 688, 491 598, 486 541"/>
  <text class="label" x="497" y="684">balance / credit update</text>

  <!-- Admin -->
  <path class="flow" d="M1455 275 H1351"/>
  <text class="label" x="1367" y="254">query / update</text>
  <path class="secondary" d="M1351 309 H1455"/>
  <text class="label" x="1364" y="344">statistics and records</text>
  <path class="secondary" d="M1041 301 C878 330, 720 399, 584 472"/>
  <text class="label" x="788" y="364">read / edit credits</text>
  <path class="secondary" d="M1137 360 C1126 503, 1120 632, 1158 718"/>
  <text class="label" x="1136" y="489">read scans</text>
  <path class="secondary" d="M1057 338 C889 569, 667 846, 548 1030"/>
  <text class="label" x="792" y="911">read listings</text>

  <rect class="note" x="40" y="1142" width="1620" height="27"/>
  <text class="noteText" x="56" y="1161">D1-D4 match the implemented Prisma/SQLite tables. The AI service classifies images; Scan stores the accepted result used by impact tracking.</text>
</svg>
