<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EcoCycle - Reset Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { min-height: max(884px, 100dvh); font-family: 'Plus Jakarta Sans', sans-serif; }
  .soft-elevation { box-shadow: 0 4px 20px -2px rgba(0, 107, 95, 0.08); }
  .tab-active { background-color: #006b5f; color: #ffffff; }
  .tab-inactive { background-color: transparent; color: #6b7a76; }
</style>
</head>
<body class="bg-[#f7f9fb] text-[#191c1e] min-h-screen flex items-center justify-center p-4">

<!-- Background blobs -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
  <div class="absolute -top-[10%] -right-[5%] w-[400px] h-[400px] rounded-full bg-teal-100/40 blur-[80px]"></div>
  <div class="absolute -bottom-[10%] -left-[5%] w-[400px] h-[400px] rounded-full bg-green-100/30 blur-[80px]"></div>
</div>

<main class="w-full max-w-[440px] flex flex-col gap-8">
  <!-- Brand -->
  <div class="flex flex-col items-center text-center gap-4">
    <div class="w-20 h-20 bg-[#2dd4bf] rounded-3xl flex items-center justify-center soft-elevation">
      <span class="material-symbols-outlined text-[40px] text-[#00574d]" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
    </div>
    <div>
      <h1 class="text-[32px] font-bold text-[#191c1e] leading-tight">Reset Access</h1>
      <p class="text-[16px] text-[#3c4a46] mt-1 max-w-[300px]">Choose how you'd like to recover your EcoCycle account.</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="bg-[#eceef0] p-1 rounded-2xl flex gap-1">
    <button id="tab-reset" onclick="switchTab('reset')" class="tab-active flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200">
      Reset Password
    </button>
    <button id="tab-magic" onclick="switchTab('magic')" class="tab-inactive flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200">
      Magic Link
    </button>
  </div>

  <!-- Reset Password Panel -->
  <section id="panel-reset" class="bg-white p-8 rounded-[32px] soft-elevation border border-[#e6e8ea]">
    <p class="text-sm text-[#3c4a46] mb-6">Enter your email and we'll send you a link to reset your password.</p>
    <div class="flex flex-col gap-4">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-[#6b7a76] text-[20px]">mail</span>
        </div>
        <input id="reset-email" type="email" placeholder="hello@ecocycle.com"
          class="w-full bg-[#f2f4f6] border-none h-14 pl-12 pr-4 text-[16px] text-[#191c1e] focus:ring-2 focus:ring-[#2dd4bf] placeholder:text-[#bacac5] rounded-xl outline-none"/>
      </div>
      <button id="resetBtn" onclick="sendPasswordReset()"
        class="w-full bg-[#006b5f] text-white h-14 rounded-xl flex items-center justify-center gap-2 font-semibold text-sm hover:bg-[#005047] active:scale-[0.98] transition-all duration-200">
        Send Reset Link
        <span class="material-symbols-outlined text-[18px]">send</span>
      </button>
      <p id="reset-msg" class="text-sm text-center"></p>
    </div>
  </section>

  <!-- Magic Link Panel -->
  <section id="panel-magic" class="hidden bg-white p-8 rounded-[32px] soft-elevation border border-[#e6e8ea]">
    <p class="text-sm text-[#3c4a46] mb-6">We'll send a one-time sign-in link to your email. No password needed!</p>
    <div class="flex flex-col gap-4">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-[#6b7a76] text-[20px]">mail</span>
        </div>
        <input id="magic-email" type="email" placeholder="hello@ecocycle.com"
          class="w-full bg-[#f2f4f6] border-none h-14 pl-12 pr-4 text-[16px] text-[#191c1e] focus:ring-2 focus:ring-[#2dd4bf] placeholder:text-[#bacac5] rounded-xl outline-none"/>
      </div>
      <button id="magicBtn" onclick="sendMagicLink()"
        class="w-full bg-[#006e2f] text-white h-14 rounded-xl flex items-center justify-center gap-2 font-semibold text-sm hover:bg-[#005321] active:scale-[0.98] transition-all duration-200">
        Send Magic Link
        <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
      </button>
      <p id="magic-msg" class="text-sm text-center"></p>
    </div>
  </section>

  <!-- Back to Sign In -->
  <a href="signIn.html" class="flex items-center justify-center gap-2 text-[#006b5f] font-semibold text-sm hover:underline">
    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
    Back to Sign In
  </a>
</main>

<script>
const supabaseUrl = "https://eupolobairqsuzjnihkc.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1cG9sb2JhaXJxc3V6am5paGtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODA5ODQsImV4cCI6MjA5MzA1Njk4NH0._rUClX25cP5g6N1SOnggotJe0mqL63jisqLjjz7ZWK4";
let _supabase = null;
function getClient() {
  if (!_supabase) _supabase = supabase.createClient(supabaseUrl, supabaseKey);
  return _supabase;
}

function switchTab(tab) {
  const isReset = tab === 'reset';
  document.getElementById('tab-reset').className = isReset ? 'tab-active flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200' : 'tab-inactive flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200';
  document.getElementById('tab-magic').className = !isReset ? 'tab-active flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200' : 'tab-inactive flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200';
  document.getElementById('panel-reset').classList.toggle('hidden', !isReset);
  document.getElementById('panel-magic').classList.toggle('hidden', isReset);
}

async function sendPasswordReset() {
  const sb = getClient();
  const email = document.getElementById('reset-email').value.trim();
  const msg = document.getElementById('reset-msg');
  const btn = document.getElementById('resetBtn');
  if (!email) { msg.innerText = 'Please enter your email.'; msg.className = 'text-red-500 text-sm text-center'; return; }
  btn.disabled = true; btn.innerText = 'Sending...';
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/Authentication/resetPassword.html'
  });
  if (error) {
    msg.innerText = error.message; msg.className = 'text-red-500 text-sm text-center';
  } else {
    msg.innerText = '✅ Password reset link sent! Check your inbox.'; msg.className = 'text-green-600 text-sm text-center';
  }
  btn.disabled = false; btn.innerHTML = 'Send Reset Link <span class="material-symbols-outlined text-[18px]">send</span>';
}

async function sendMagicLink() {
  const sb = getClient();
  const email = document.getElementById('magic-email').value.trim();
  const msg = document.getElementById('magic-msg');
  const btn = document.getElementById('magicBtn');
  if (!email) { msg.innerText = 'Please enter your email.'; msg.className = 'text-red-500 text-sm text-center'; return; }
  btn.disabled = true; btn.innerText = 'Sending...';
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + '/../dashboard.html' }
  });
  if (error) {
    msg.innerText = error.message; msg.className = 'text-red-500 text-sm text-center';
  } else {
    msg.innerText = '✨ Magic link sent! Check your inbox.'; msg.className = 'text-green-600 text-sm text-center';
  }
  btn.disabled = false; btn.innerHTML = 'Send Magic Link <span class="material-symbols-outlined text-[18px]">auto_awesome</span>';
}
</script>
</body>
</html>
