<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EcoCycle - Set New Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { min-height: max(884px, 100dvh); font-family: 'Plus Jakarta Sans', sans-serif; }
  .soft-elevation { box-shadow: 0 4px 20px -2px rgba(0, 107, 95, 0.08); }
</style>
</head>
<body class="bg-[#f7f9fb] text-[#191c1e] min-h-screen flex items-center justify-center p-4">
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
  <div class="absolute -top-[10%] -right-[5%] w-[400px] h-[400px] rounded-full bg-teal-100/40 blur-[80px]"></div>
  <div class="absolute -bottom-[10%] -left-[5%] w-[400px] h-[400px] rounded-full bg-green-100/30 blur-[80px]"></div>
</div>

<main class="w-full max-w-[440px] flex flex-col gap-8">
  <div class="flex flex-col items-center text-center gap-4">
    <div class="w-20 h-20 bg-[#2dd4bf] rounded-3xl flex items-center justify-center soft-elevation">
      <span class="material-symbols-outlined text-[40px] text-[#00574d]" style="font-variation-settings: 'FILL' 1;">lock</span>
    </div>
    <div>
      <h1 class="text-[32px] font-bold text-[#191c1e] leading-tight">New Password</h1>
      <p class="text-[16px] text-[#3c4a46] mt-1">Enter a strong new password for your account.</p>
    </div>
  </div>

  <!-- Loading state while Supabase processes the token -->
  <div id="loading-state" class="bg-white p-8 rounded-[32px] soft-elevation border border-[#e6e8ea] text-center">
    <span class="material-symbols-outlined text-[#006b5f] text-5xl animate-spin">progress_activity</span>
    <p class="mt-4 text-[#3c4a46]">Verifying your reset link...</p>
  </div>

  <!-- Password Form (shown after token verified) -->
  <section id="password-form" class="hidden bg-white p-8 rounded-[32px] soft-elevation border border-[#e6e8ea]">
    <div class="flex flex-col gap-4">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-[#6b7a76] text-[20px]">lock</span>
        </div>
        <input id="new-password" type="password" placeholder="New password (min 8 chars)"
          class="w-full bg-[#f2f4f6] border-none h-14 pl-12 pr-4 text-[16px] focus:ring-2 focus:ring-[#2dd4bf] placeholder:text-[#bacac5] rounded-xl outline-none"/>
      </div>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-[#6b7a76] text-[20px]">lock_reset</span>
        </div>
        <input id="confirm-password" type="password" placeholder="Confirm new password"
          class="w-full bg-[#f2f4f6] border-none h-14 pl-12 pr-4 text-[16px] focus:ring-2 focus:ring-[#2dd4bf] placeholder:text-[#bacac5] rounded-xl outline-none"/>
      </div>
      <button id="updateBtn" onclick="updatePassword()"
        class="w-full bg-[#006b5f] text-white h-14 rounded-xl flex items-center justify-center gap-2 font-semibold text-sm hover:bg-[#005047] active:scale-[0.98] transition-all duration-200">
        Update Password
        <span class="material-symbols-outlined text-[18px]">check_circle</span>
      </button>
      <p id="update-msg" class="text-sm text-center"></p>
    </div>
  </section>

  <!-- Error State -->
  <section id="error-state" class="hidden bg-white p-8 rounded-[32px] soft-elevation border border-[#ffdad6] text-center">
    <span class="material-symbols-outlined text-[#ba1a1a] text-5xl">error</span>
    <p class="mt-4 text-[#ba1a1a] font-semibold">Invalid or expired reset link.</p>
    <a href="forgotPassword.html" class="mt-4 inline-block text-[#006b5f] font-semibold hover:underline">Request a new link →</a>
  </section>
</main>

<script>
const supabaseUrl = "https://eupolobairqsuzjnihkc.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1cG9sb2JhaXJxc3V6am5paGtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODA5ODQsImV4cCI6MjA5MzA1Njk4NH0._rUClX25cP5g6N1SOnggotJe0mqL63jisqLjjz7ZWK4";
let _supabase = null;
function getClient() {
  if (!_supabase) _supabase = supabase.createClient(supabaseUrl, supabaseKey);
  return _supabase;
}

// Supabase puts the recovery token in the URL hash — listen for the session event
getClient().auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Token is valid, show the form
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('password-form').classList.remove('hidden');
  } else if (!session && !window.location.hash.includes('access_token')) {
    // No token at all, show error
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('error-state').classList.remove('hidden');
  }
});

async function updatePassword() {
  const sb = getClient();
  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  const msg = document.getElementById('update-msg');
  const btn = document.getElementById('updateBtn');

  if (newPass.length < 8) {
    msg.innerText = 'Password must be at least 8 characters.';
    msg.className = 'text-red-500 text-sm text-center';
    return;
  }
  if (newPass !== confirmPass) {
    msg.innerText = 'Passwords do not match.';
    msg.className = 'text-red-500 text-sm text-center';
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Updating...';

  const { error } = await sb.auth.updateUser({ password: newPass });
  if (error) {
    msg.innerText = error.message;
    msg.className = 'text-red-500 text-sm text-center';
    btn.disabled = false;
    btn.innerHTML = 'Update Password <span class="material-symbols-outlined text-[18px]">check_circle</span>';
  } else {
    msg.innerText = '✅ Password updated! Redirecting to sign in...';
    msg.className = 'text-green-600 text-sm text-center';
    await sb.auth.signOut();
    setTimeout(() => { window.location.href = 'signIn.html'; }, 2000);
  }
}
</script>
</body>
</html>
